name: Release

on:
  pull_request:
    types: [closed]
    branches: [main, master]

concurrency:
  group: release-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Bump version and publish
    if: |
      github.event.pull_request.merged == true &&
      (
        startsWith(github.event.pull_request.head.ref, 'release/') ||
        startsWith(github.event.pull_request.head.ref, 'fix/')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine bump type
        id: bump
        run: |
          set -euo pipefail
          BRANCH="${{ github.event.pull_request.head.ref }}"
          if [[ "$BRANCH" == release/* ]]; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif [[ "$BRANCH" == fix/* ]]; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported branch name '$BRANCH'. Expected 'release/*' or 'fix/*'." >&2
            exit 1
          fi

      - name: Bump version in pyproject.toml
        id: version
        run: |
          set -euo pipefail
          BUMP_TYPE="${{ steps.bump.outputs.type }}"
          if [[ -z "${BUMP_TYPE}" ]]; then
            echo "BUMP_TYPE is empty; previous step did not set bump type." >&2
            exit 1
          fi
          if [[ "$BUMP_TYPE" != "minor" && "$BUMP_TYPE" != "patch" ]]; then
            echo "Unsupported bump type '$BUMP_TYPE'. Expected 'minor' or 'patch'." >&2
            exit 1
          fi
          CURRENT_LINE=$(grep -E '^version[[:space:]]*=[[:space:]]*"' pyproject.toml) || {
            echo "Could not find a 'version = \"MAJOR.MINOR.PATCH\"' line in pyproject.toml." >&2
            exit 1
          }
          CURRENT=$(printf '%s\n' "$CURRENT_LINE" | sed -E 's/version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          if [[ ! "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Current version '$CURRENT' is not in 'MAJOR.MINOR.PATCH' format." >&2
            exit 1
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          if [[ "$BUMP_TYPE" == "minor" ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [[ "$BUMP_TYPE" == "patch" ]]; then
            PATCH=$((PATCH + 1))
          fi
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          sed -i -E "s/^version[[:space:]]*=[[:space:]]*\"${CURRENT}\"/version = \"${NEW_VERSION}\"/" pyproject.toml
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT → $NEW_VERSION ($BUMP_TYPE)"

      - name: Tag version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin "v${{ steps.version.outputs.new_version }}"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest tests/

      - name: Build
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish
